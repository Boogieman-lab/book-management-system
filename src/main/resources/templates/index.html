<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>도서관</title>
    <th:block layout:fragment="head">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
            :root {
                --green: #4CAF50;
                --green-dark: #388E3C;
                --green-light: #E8F5E9;
                --shadow-card: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
                --shadow-card-hover: 0 20px 56px rgba(0,0,0,0.15), 0 4px 16px rgba(0,0,0,0.08);
            }

            /* ── Hero / Search ── */
            .hero {
                text-align: center;
                padding: 48px 24px 32px;
            }
            .hero h1 {
                font-size: 28px;
                font-weight: 700;
                color: #1a1a1a;
                margin: 0 0 8px;
            }
            .hero p {
                color: #666;
                font-size: 15px;
                margin: 0 0 28px;
            }
            .search-wrap {
                background: white;
                border-radius: 999px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.10);
                display: inline-flex;
                align-items: center;
                overflow: hidden;
                width: 100%;
                max-width: 560px;
            }
            .search-wrap input {
                border: none;
                outline: none;
                flex: 1;
                padding: 14px 22px;
                font-size: 15px;
                font-family: 'Noto Sans KR', sans-serif;
                background: transparent;
            }
            .search-wrap button {
                background: var(--green);
                border: none;
                color: white;
                padding: 14px 24px;
                cursor: pointer;
                font-size: 16px;
                transition: background 0.2s;
                flex-shrink: 0;
            }
            .search-wrap button:hover { background: var(--green-dark); }

            /* ── Section title ── */
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 20px;
            }
            .section-title {
                font-size: 18px;
                font-weight: 700;
                color: #1a1a1a;
            }
            .result-count {
                font-size: 13px;
                color: #888;
            }

            /* ── Book Card ── */
            .book-card {
                background: white;
                border-radius: 32px;
                box-shadow: var(--shadow-card);
                cursor: pointer;
                transition: transform 0.25s ease, box-shadow 0.25s ease;
                position: relative;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .book-card:hover {
                transform: translateY(-6px);
                box-shadow: var(--shadow-card-hover);
            }
            .book-card:active { transform: translateY(-2px); }

            .book-thumb-wrap {
                position: relative;
                width: 100%;
                padding-top: 140%;
                background: #f5f5f5;
                overflow: hidden;
                border-radius: 32px 32px 0 0;
            }
            .book-thumb-wrap img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .book-thumb-placeholder {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
                color: #81C784;
                font-size: 40px;
            }

            .avail-badge {
                position: absolute;
                top: 12px;
                right: 12px;
                font-size: 10px;
                font-weight: 700;
                padding: 4px 10px;
                border-radius: 999px;
                letter-spacing: 0.3px;
                backdrop-filter: blur(6px);
            }
            .avail-badge.available {
                background: rgba(209, 250, 229, 0.95);
                color: #065F46;
            }
            .avail-badge.borrowed {
                background: rgba(243, 244, 246, 0.95);
                color: #6B7280;
            }

            .book-card-body {
                padding: 14px 16px 18px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                flex: 1;
            }
            .book-card-title {
                font-size: 14px;
                font-weight: 600;
                color: #1a1a1a;
                line-height: 1.4;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .book-card-author {
                font-size: 12px;
                color: #888;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .book-card-stock {
                font-size: 11px;
                color: #aaa;
                margin-top: 2px;
            }

            /* ── Skeleton ── */
            .skeleton-card {
                background: white;
                border-radius: 32px;
                overflow: hidden;
                box-shadow: var(--shadow-card);
            }
            .skeleton-thumb {
                width: 100%;
                padding-top: 140%;
                position: relative;
            }
            .skeleton-thumb::before {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite;
            }
            .skeleton-body { padding: 14px 16px 18px; }
            .skeleton-line {
                height: 12px;
                border-radius: 6px;
                margin-bottom: 8px;
                background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite;
            }
            @keyframes shimmer {
                0% { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }

            /* ── Pagination ── */
            .pagination {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 8px;
                padding: 40px 0 20px;
            }
            .page-btn {
                min-width: 40px;
                height: 40px;
                border: none;
                border-radius: 12px;
                background: white;
                color: #555;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                transition: all 0.15s;
                padding: 0 14px;
            }
            .page-btn:hover { background: var(--green-light); color: var(--green-dark); }
            .page-btn.active { background: var(--green); color: white; box-shadow: 0 4px 14px rgba(76,175,80,0.35); }
            .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

            /* ── Empty State ── */
            .empty-state {
                text-align: center;
                padding: 80px 24px;
                color: #aaa;
            }
            .empty-state i { font-size: 48px; margin-bottom: 16px; }
            .empty-state p { font-size: 16px; }

            /* ── Detail Modal ── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.52);
                backdrop-filter: blur(4px);
                z-index: 300;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.22s ease;
            }
            .modal-overlay.open {
                opacity: 1;
                pointer-events: all;
            }
            .modal-box {
                background: white;
                border-radius: 32px;
                box-shadow: 0 24px 80px rgba(0,0,0,0.22);
                width: 100%;
                max-width: 660px;
                max-height: 90vh;
                overflow-y: auto;
                transform: translateY(16px) scale(0.97);
                transition: transform 0.22s ease;
            }
            .modal-overlay.open .modal-box {
                transform: translateY(0) scale(1);
            }
            .modal-close-btn {
                position: absolute;
                top: 20px;
                right: 24px;
                background: #F3F4F6;
                border: none;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                font-size: 16px;
                cursor: pointer;
                color: #555;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }
            .modal-close-btn:hover { background: #E5E7EB; }
            .modal-header {
                position: relative;
                padding: 28px 28px 20px;
                border-bottom: 1px solid #F3F4F6;
            }
            .modal-body {
                padding: 24px 28px 28px;
            }

            .stock-box {
                display: flex;
                align-items: center;
                gap: 12px;
                background: #F9FAFB;
                border-radius: 16px;
                padding: 16px 20px;
                margin-bottom: 20px;
            }
            .stock-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
            }
            .stock-num {
                font-size: 22px;
                font-weight: 700;
            }
            .stock-label {
                font-size: 11px;
                color: #888;
            }
            .stock-divider { width: 1px; height: 36px; background: #E5E7EB; }

            .meta-row {
                display: flex;
                gap: 8px;
                align-items: baseline;
                margin-bottom: 10px;
                font-size: 14px;
            }
            .meta-key {
                color: #888;
                flex-shrink: 0;
                width: 56px;
            }
            .meta-val { color: #1a1a1a; font-weight: 500; }

            .desc-text {
                font-size: 13px;
                color: #555;
                line-height: 1.7;
                margin-top: 16px;
                padding-top: 16px;
                border-top: 1px solid #F3F4F6;
                display: -webkit-box;
                -webkit-line-clamp: 5;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .btn-action {
                width: 100%;
                border: none;
                border-radius: 18px;
                padding: 16px;
                font-size: 17px;
                font-weight: 700;
                cursor: pointer;
                transition: filter 0.2s, transform 0.1s;
                margin-top: 20px;
                letter-spacing: 0.3px;
            }
            .btn-action:hover { filter: brightness(1.06); transform: translateY(-1px); }
            .btn-action:active { transform: translateY(0); }
            .btn-borrow {
                background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
                color: white;
                box-shadow: 0 6px 20px rgba(76,175,80,0.35);
            }
            .btn-reserve {
                background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
                color: white;
                box-shadow: 0 6px 20px rgba(245,158,11,0.30);
            }

            @media (max-width: 640px) {
                .modal-header, .modal-body { padding: 20px; }
            }
        </style>
    </th:block>
</head>
<body>
    <th:block layout:fragment="content">
        <!-- Hero -->
        <section class="hero">
            <h1>도서를 검색하세요</h1>
            <p>보유 도서를 검색하고 대출 · 예약하세요</p>
            <div class="search-wrap">
                <input id="searchInput" type="text" placeholder="도서명, 저자, ISBN으로 검색">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
        </section>

        <!-- Book Grid -->
        <div class="section-header">
            <span class="section-title" id="sectionTitle">전체 도서</span>
            <span class="result-count" id="resultCount"></span>
        </div>

        <div id="bookGrid" class="grid gap-5" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));"></div>

        <div id="emptyState" class="empty-state" style="display:none;">
            <i class="fas fa-book-open"></i>
            <p id="emptyMsg">검색 결과가 없습니다.</p>
        </div>

        <div id="pagination" class="pagination"></div>
    </th:block>

    <!-- Detail Modal (fixed overlay, lives outside main flow) -->
    <th:block layout:fragment="script">
        <div id="detailModal" class="modal-overlay" onclick="handleOverlayClick(event)">
            <div class="modal-box" id="modalBox">
                <div class="modal-header">
                    <button class="modal-close-btn" onclick="closeDetail()"><i class="fas fa-times"></i></button>
                    <div style="display:flex;gap:20px;align-items:flex-start;">
                        <div id="modalThumbWrap" style="flex-shrink:0;width:100px;height:148px;border-radius:16px;overflow:hidden;background:#f5f5f5;"></div>
                        <div style="flex:1;min-width:0;">
                            <div id="modalBadge" style="margin-bottom:10px;"></div>
                            <h2 id="modalTitle" style="font-size:18px;font-weight:700;color:#1a1a1a;margin:0 0 12px;line-height:1.4;"></h2>
                            <div id="modalMeta"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="stock-box">
                        <div class="stock-item">
                            <span class="stock-num" id="modalAvailStock" style="color:#4CAF50;">-</span>
                            <span class="stock-label">대출가능</span>
                        </div>
                        <div class="stock-divider"></div>
                        <div class="stock-item">
                            <span class="stock-num" id="modalTotalStock" style="color:#888;">-</span>
                            <span class="stock-label">전체 소장</span>
                        </div>
                    </div>

                    <div id="modalDesc" class="desc-text"></div>

                    <button id="actionBtn" class="btn-action" style="display:none;"></button>
                </div>
            </div>
        </div>

        <script src="/js/api.js"></script>
        <script>
            // ── State ──
            let currentPage = 0;
            let totalPages = 1;
            let currentKeyword = '';
            let currentBookId = null;
            let currentHolds = [];

            // ── Auth UI ──
            document.addEventListener('DOMContentLoaded', () => {
                const isLoggedIn = !!localStorage.getItem('accessToken');
                document.getElementById('auth-buttons').style.display = isLoggedIn ? 'none' : 'flex';
                document.getElementById('user-menu').style.display = isLoggedIn ? 'flex' : 'none';

                document.getElementById('logout-btn')?.addEventListener('click', async () => {
                    try { await window.api.fetch('/api/auth/logout', { method: 'POST' }); } catch(e) {}
                    localStorage.removeItem('accessToken');
                    window.location.reload();
                });

                loadBooks(0, '');
            });

            // ── Load & Render Books ──
            async function loadBooks(page, keyword) {
                currentPage = page;
                currentKeyword = keyword;

                showSkeletons();

                let url = `/api/v1/books?page=${page}&size=20`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

                try {
                    const res = await window.api.fetch(url);
                    if (!res.ok) throw new Error('Failed');
                    const data = await res.json();
                    totalPages = data.totalPages || 1;
                    renderBooks(data.content || [], data.totalElements || 0);
                    renderPagination(data.number, data.totalPages);
                } catch(e) {
                    console.error(e);
                    showEmpty('데이터를 불러오지 못했습니다.');
                }
            }

            function showSkeletons() {
                const grid = document.getElementById('bookGrid');
                grid.innerHTML = Array.from({length: 10}).map(() => `
                    <div class="skeleton-card">
                        <div class="skeleton-thumb"></div>
                        <div class="skeleton-body">
                            <div class="skeleton-line" style="width:80%"></div>
                            <div class="skeleton-line" style="width:55%"></div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('pagination').innerHTML = '';
            }

            function renderBooks(books, total) {
                const grid = document.getElementById('bookGrid');
                document.getElementById('resultCount').textContent = `총 ${total}권`;

                if (!books.length) {
                    grid.innerHTML = '';
                    showEmpty(currentKeyword ? `'${currentKeyword}' 검색 결과가 없습니다.` : '등록된 도서가 없습니다.');
                    return;
                }
                document.getElementById('emptyState').style.display = 'none';

                grid.innerHTML = books.map(book => {
                    const authors = Array.isArray(book.authors) ? book.authors.join(', ') : (book.authors || '저자 미상');
                    const available = book.availableStock > 0;
                    const thumbHtml = book.thumbnail
                        ? `<img src="${escHtml(book.thumbnail)}" alt="${escHtml(book.title)}" onerror="this.parentElement.innerHTML='<div class=\\'book-thumb-placeholder\\'><i class=\\'fas fa-book\\'></i></div>'">`
                        : `<div class="book-thumb-placeholder"><i class="fas fa-book"></i></div>`;

                    return `
                        <div class="book-card" onclick="openDetail(${book.bookId})">
                            <div class="book-thumb-wrap">
                                ${thumbHtml}
                                <span class="avail-badge ${available ? 'available' : 'borrowed'}">
                                    ${available ? '대출가능' : '대출중'}
                                </span>
                            </div>
                            <div class="book-card-body">
                                <div class="book-card-title">${escHtml(book.title || '제목 없음')}</div>
                                <div class="book-card-author">${escHtml(authors)}</div>
                                <div class="book-card-stock">${book.availableStock}/${book.totalStock}권 가능</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            function showEmpty(msg) {
                document.getElementById('bookGrid').innerHTML = '';
                document.getElementById('emptyMsg').textContent = msg;
                document.getElementById('emptyState').style.display = 'block';
            }

            // ── Pagination ──
            function renderPagination(current, total) {
                const el = document.getElementById('pagination');
                if (total <= 1) { el.innerHTML = ''; return; }

                const range = [];
                const delta = 2;
                for (let i = Math.max(0, current - delta); i <= Math.min(total - 1, current + delta); i++) {
                    range.push(i);
                }

                let html = `<button class="page-btn" ${current === 0 ? 'disabled' : ''} onclick="loadBooks(${current - 1}, currentKeyword)"><i class="fas fa-chevron-left"></i></button>`;
                range.forEach(p => {
                    html += `<button class="page-btn ${p === current ? 'active' : ''}" onclick="loadBooks(${p}, currentKeyword)">${p + 1}</button>`;
                });
                html += `<button class="page-btn" ${current >= total - 1 ? 'disabled' : ''} onclick="loadBooks(${current + 1}, currentKeyword)"><i class="fas fa-chevron-right"></i></button>`;
                el.innerHTML = html;
            }

            // ── Search ──
            document.getElementById('searchBtn').addEventListener('click', doSearch);
            document.getElementById('searchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') doSearch();
            });
            function doSearch() {
                const kw = document.getElementById('searchInput').value.trim();
                document.getElementById('sectionTitle').textContent = kw ? `"${kw}" 검색 결과` : '전체 도서';
                loadBooks(0, kw);
            }

            // ── Detail Modal ──
            async function openDetail(bookId) {
                currentBookId = bookId;
                currentHolds = [];

                document.getElementById('detailModal').classList.add('open');
                document.body.style.overflow = 'hidden';

                document.getElementById('modalTitle').textContent = '불러오는 중...';
                document.getElementById('modalMeta').innerHTML = '';
                document.getElementById('modalThumbWrap').innerHTML = '<div style="width:100%;height:100%;background:#f0f0f0;border-radius:16px;"></div>';
                document.getElementById('modalDesc').textContent = '';
                document.getElementById('actionBtn').style.display = 'none';
                document.getElementById('modalBadge').innerHTML = '';
                document.getElementById('modalAvailStock').textContent = '-';
                document.getElementById('modalTotalStock').textContent = '-';

                try {
                    const [detailRes, holdsRes] = await Promise.all([
                        window.api.fetch(`/api/v1/books/${bookId}`),
                        window.api.fetch(`/api/books/${bookId}/holds`)
                    ]);

                    const book = await detailRes.json();
                    const holds = holdsRes.ok ? await holdsRes.json() : [];
                    currentHolds = Array.isArray(holds) ? holds : [];

                    renderModal(book);
                } catch(e) {
                    console.error(e);
                    document.getElementById('modalTitle').textContent = '불러오기 실패';
                }
            }

            function renderModal(book) {
                const available = book.availableStock > 0;
                const authors = Array.isArray(book.authors) ? book.authors.join(', ') : (book.authors || '-');
                const pubDate = book.publishedAt ? book.publishedAt.substring(0, 10) : '-';

                document.getElementById('modalThumbWrap').innerHTML = book.thumbnail
                    ? `<img src="${escHtml(book.thumbnail)}" alt="${escHtml(book.title)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#E8F5E9;color:#81C784;font-size:32px;\\'><i class=\\'fas fa-book\\'></i></div>'">`
                    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#E8F5E9;color:#81C784;font-size:32px;"><i class="fas fa-book"></i></div>`;

                document.getElementById('modalBadge').innerHTML = `
                    <span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;
                        background:${available ? 'rgba(209,250,229,0.9)' : 'rgba(243,244,246,0.9)'};
                        color:${available ? '#065F46' : '#6B7280'};">
                        ${available ? '대출가능' : '대출중'}
                    </span>`;

                document.getElementById('modalTitle').textContent = book.title || '-';

                document.getElementById('modalMeta').innerHTML = `
                    <div class="meta-row"><span class="meta-key">저자</span><span class="meta-val">${escHtml(authors)}</span></div>
                    <div class="meta-row"><span class="meta-key">출판사</span><span class="meta-val">${escHtml(book.publisher || '-')}</span></div>
                    <div class="meta-row"><span class="meta-key">출판일</span><span class="meta-val">${pubDate}</span></div>
                    ${book.isbn ? `<div class="meta-row"><span class="meta-key">ISBN</span><span class="meta-val" style="font-size:12px;color:#888;">${escHtml(book.isbn)}</span></div>` : ''}
                `;

                document.getElementById('modalAvailStock').textContent = book.availableStock;
                document.getElementById('modalTotalStock').textContent = book.totalStock;
                document.getElementById('modalDesc').textContent = book.contents || '';

                const actionBtn = document.getElementById('actionBtn');
                actionBtn.style.display = 'block';
                if (available) {
                    actionBtn.className = 'btn-action btn-borrow';
                    actionBtn.innerHTML = '<i class="fas fa-book-reader" style="margin-right:8px;"></i>대출하기';
                    actionBtn.onclick = handleBorrow;
                } else {
                    actionBtn.className = 'btn-action btn-reserve';
                    actionBtn.innerHTML = '<i class="fas fa-bookmark" style="margin-right:8px;"></i>예약하기';
                    actionBtn.onclick = handleReserve;
                }
            }

            function closeDetail() {
                document.getElementById('detailModal').classList.remove('open');
                document.body.style.overflow = '';
                currentBookId = null;
                currentHolds = [];
            }

            function handleOverlayClick(e) {
                if (e.target === document.getElementById('detailModal')) closeDetail();
            }

            // ── Borrow ──
            async function handleBorrow() {
                const availableHold = currentHolds.find(h => h.status === 'AVAILABLE');
                if (!availableHold) {
                    Swal.fire({ title: '재고 없음', text: '현재 대출 가능한 도서가 없습니다.', icon: 'warning', confirmButtonColor: '#4CAF50' });
                    return;
                }

                const confirm = await Swal.fire({
                    title: '도서 대출',
                    html: `<b style="color:#388E3C;">${document.getElementById('modalTitle').textContent}</b><br>이 도서를 대출하시겠습니까?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#4CAF50',
                    cancelButtonColor: '#aaa',
                    confirmButtonText: '대출하기',
                    cancelButtonText: '취소'
                });
                if (!confirm.isConfirmed) return;

                try {
                    const res = await window.api.fetch('/api/v1/borrows', {
                        method: 'POST',
                        body: JSON.stringify({ bookHoldId: availableHold.holdId, reason: '' })
                    });

                    if (res.status === 201 || res.ok) {
                        await Swal.fire({
                            title: '대출 완료!',
                            html: '도서 대출이 완료되었습니다.<br><small style="color:#888;">반납일을 꼭 지켜주세요.</small>',
                            icon: 'success',
                            confirmButtonColor: '#4CAF50',
                            confirmButtonText: '확인'
                        });
                        closeDetail();
                        loadBooks(currentPage, currentKeyword);
                    } else {
                        const err = await res.json().catch(() => ({}));
                        Swal.fire({ title: '대출 실패', text: err.message || '대출 처리 중 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#4CAF50' });
                    }
                } catch(e) {
                    Swal.fire({ title: '오류', text: '네트워크 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#4CAF50' });
                }
            }

            // ── Reserve ──
            async function handleReserve() {
                const confirm = await Swal.fire({
                    title: '도서 예약',
                    html: `<b style="color:#D97706;">${document.getElementById('modalTitle').textContent}</b><br>이 도서를 예약하시겠습니까?<br><small style="color:#888;">반납 시 알림을 드립니다.</small>`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#F59E0B',
                    cancelButtonColor: '#aaa',
                    confirmButtonText: '예약하기',
                    cancelButtonText: '취소'
                });
                if (!confirm.isConfirmed) return;

                try {
                    const res = await window.api.fetch('/api/v1/reservations', {
                        method: 'POST',
                        body: JSON.stringify({ bookId: currentBookId })
                    });

                    if (res.status === 201 || res.ok) {
                        await Swal.fire({
                            title: '예약 완료!',
                            html: '예약이 완료되었습니다.<br><small style="color:#888;">반납되면 알림을 보내드립니다.</small>',
                            icon: 'success',
                            confirmButtonColor: '#4CAF50',
                            confirmButtonText: '확인'
                        });
                        closeDetail();
                    } else {
                        const err = await res.json().catch(() => ({}));
                        Swal.fire({ title: '예약 실패', text: err.message || '예약 처리 중 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#4CAF50' });
                    }
                } catch(e) {
                    Swal.fire({ title: '오류', text: '네트워크 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#4CAF50' });
                }
            }

            // ── ESC to close ──
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') closeDetail();
            });

            // ── Util ──
            function escHtml(str) {
                if (!str) return '';
                return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }
        </script>
    </th:block>
</body>
</html>
