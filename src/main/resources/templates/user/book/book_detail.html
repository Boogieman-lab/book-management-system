<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>도서 상세</title>
</head>
<body>

<th:block layout:fragment="head">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* ── 공통 카드 ───────────────────────────────────────────── */
        .detail-card {
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / .06);
            border: 1px solid #f3f4f6;
            padding: 2rem;
        }

        /* ── 섹션 제목 ───────────────────────────────────────────── */
        .section-title {
            font-size: .875rem;
            font-weight: 900;
            color: #374151;
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.25rem;
        }

        /* ── 메타 행 ─────────────────────────────────────────────── */
        .meta-row   { display: flex; align-items: center; gap: .5rem; }
        .meta-label { width: 3.5rem; font-size: .875rem; font-weight: 700; color: #6b7280; flex-shrink: 0; }
        .meta-value { font-size: .875rem; color: #1f2937; }

        /* ── 상태 뱃지 ───────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: .15rem .625rem;
            font-size: .625rem;
            font-weight: 900;
            border-radius: 9999px;
            border: 1px solid transparent;
        }
        .badge-green { background: #e6f7ef; color: #005c38; border-color: rgba(0,167,96,.2); }
        .badge-amber { background: #fffbeb; color: #d97706; border-color: #fde68a; }
        .badge-red   { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
        .badge-blue  { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
        .badge-gray  { background: #f3f4f6; color: #6b7280; border-color: #e5e7eb; }

        /* ── 대출 가능 현황 배너 ─────────────────────────────────── */
        .avail-bar {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .875rem 1.25rem;
            border-radius: 1rem;
            font-size: .9375rem;
            font-weight: 700;
            margin-bottom: 1.75rem;
            border: 1px solid transparent;
        }
        .avail-bar strong { font-size: 1.25rem; font-weight: 900; margin: 0 .125rem; }
        .avail-bar-ok   { background: #e6f7ef; color: #005c38; border-color: rgba(0,167,96,.18); }
        .avail-bar-none { background: #fffbeb; color: #92400e; border-color: #fde68a; }

        /* ── 액션 버튼 ───────────────────────────────────────────── */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .875rem 2.5rem;
            border-radius: 1rem;
            font-weight: 900;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / .08);
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease;
        }
        .action-btn:hover          { transform: translateY(-2px); box-shadow: 0 6px 16px 0 rgb(0 0 0 / .12); }
        .action-btn-primary        { background: #00A760; color: #fff; }
        .action-btn-primary:hover  { background: #008a4f; }
        .action-btn-reserve        { background: #f59e0b; color: #fff; }
        .action-btn-reserve:hover  { background: #d97706; }
        .action-btn-return         { background: #6b7280; color: #fff; }
        .action-btn-return:hover   { background: #374151; }

        /* ── 테이블 헤더 셀 ──────────────────────────────────────── */
        .tbl-th { padding-bottom: .75rem; text-align: left; font-weight: 700; color: #6b7280; padding-right: 1rem; font-size: .875rem; }

        /* ── 도서 소개 clamp ─────────────────────────────────────── */
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</th:block>

<th:block layout:fragment="content">

    <!-- 뒤로가기 -->
    <div class="mb-6">
        <a href="/books" class="inline-flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-boogie-main transition-colors">
            <i class="fas fa-chevron-left text-xs"></i> 도서 목록으로
        </a>
    </div>

    <!-- ── 스켈레톤 로딩 ──────────────────────────────────────────── -->
    <div id="skeleton" class="detail-card animate-pulse">
        <div class="h-12 bg-gray-100 rounded-xl w-1/3 mb-6"></div>
        <div class="flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-44 flex-shrink-0">
                <div class="w-44 h-64 bg-gray-100 rounded-2xl mx-auto"></div>
            </div>
            <div class="flex-1 space-y-4">
                <div class="h-7 bg-gray-100 rounded-full w-3/4"></div>
                <div class="h-4 bg-gray-100 rounded-full w-1/2"></div>
                <div class="h-4 bg-gray-100 rounded-full w-1/3"></div>
                <div class="h-4 bg-gray-100 rounded-full w-2/5"></div>
                <div class="mt-6 h-12 bg-gray-100 rounded-2xl w-48"></div>
            </div>
        </div>
    </div>

    <!-- ── 메인 카드 (숨김 상태로 시작) ─────────────────────────── -->
    <div id="detailCard" class="hidden">

        <!-- 도서 기본 정보 카드 -->
        <div class="detail-card">

            <!-- ① 대출 가능 현황 배너 -->
            <div id="availabilityBar" class="avail-bar">
                <i id="availabilityIcon" class="fas fa-circle-check text-xl flex-shrink-0"></i>
                <span id="availabilityText">현재 대출 가능 <strong id="availableCount">-</strong>권</span>
            </div>

            <div class="flex flex-col lg:flex-row gap-8">

                <!-- 왼쪽: 썸네일 -->
                <div class="flex-shrink-0 flex justify-center lg:justify-start">
                    <div id="thumbnailWrap" class="w-44 h-64 rounded-2xl overflow-hidden bg-gray-50 shadow-sm flex items-center justify-center">
                        <i class="fas fa-book text-5xl text-gray-200"></i>
                    </div>
                </div>

                <!-- 오른쪽: 메타 정보 + 버튼 -->
                <div class="flex-1 flex flex-col">

                    <!-- 제목 -->
                    <h1 id="bookTitle" class="text-2xl font-black text-gray-900 leading-snug mb-5">-</h1>

                    <!-- 메타 정보 -->
                    <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-3 mb-6">
                        <div class="meta-row">
                            <dt class="meta-label">저자</dt>
                            <dd id="bookAuthors" class="meta-value">-</dd>
                        </div>
                        <div class="meta-row">
                            <dt class="meta-label">출판사</dt>
                            <dd id="bookPublisher" class="meta-value">-</dd>
                        </div>
                        <div class="meta-row">
                            <dt class="meta-label">출판일</dt>
                            <dd id="bookPublishedAt" class="meta-value">-</dd>
                        </div>
                        <div class="meta-row">
                            <dt class="meta-label">ISBN</dt>
                            <dd id="bookIsbn" class="meta-value font-mono text-xs">-</dd>
                        </div>
                    </dl>

                    <!-- 대출하기 / 예약하기 버튼 -->
                    <div class="mt-auto">
                        <button id="mainActionBtn" class="hidden action-btn">-</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── 도서 소개 카드 ────────────────────────────────────── -->
        <div id="descriptionCard" class="hidden detail-card mt-4">
            <h2 class="section-title">
                <i class="fas fa-book-open text-boogie-main text-sm"></i> 도서 소개
            </h2>
            <div class="relative">
                <p id="bookContents" class="text-sm text-gray-600 leading-loose whitespace-pre-line line-clamp-3 transition-all duration-300"></p>
                <div id="contentOverlay" class="absolute bottom-0 left-0 w-full h-12 bg-gradient-to-t from-white to-transparent pointer-events-none"></div>
            </div>
            <button id="expandContentsBtn" class="mt-2 text-boogie-main font-bold text-sm hidden items-center justify-center w-full gap-1 p-2 hover:bg-boogie-light rounded-xl transition-colors">
                <span>더보기</span> <i class="fas fa-chevron-down text-xs"></i>
            </button>
        </div>

        <!-- ── 소장 정보 카드 ────────────────────────────────────── -->
        <div class="detail-card mt-4">
            <h2 class="section-title">
                <i class="fas fa-layer-group text-boogie-main text-sm"></i>
                소장 정보
                <span id="holdCountBadge" class="ml-1 px-2 py-0.5 text-xs font-bold bg-boogie-light text-boogie-dark rounded-full"></span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b-2 border-boogie-main">
                            <th class="tbl-th">등록번호</th>
                            <th class="tbl-th">상태</th>
                            <th class="tbl-th">위치</th>
                            <th class="tbl-th" style="padding-right:0">반납예정일</th>
                        </tr>
                    </thead>
                    <tbody id="holdsTbody" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>

        <!-- ── 예약 대기 현황 카드 ───────────────────────────────── -->
        <div id="reservationCard" class="hidden detail-card mt-4">
            <h2 class="section-title">
                <i class="fas fa-clock text-amber-500 text-sm"></i>
                예약 대기 현황
                <span id="reservationCountBadge" class="ml-1 px-2 py-0.5 text-xs font-bold bg-amber-50 text-amber-600 rounded-full"></span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b-2 border-amber-300">
                            <th class="tbl-th">순위</th>
                            <th class="tbl-th">예약자</th>
                            <th class="tbl-th" style="padding-right:0">예약일시</th>
                        </tr>
                    </thead>
                    <tbody id="reservationTbody" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ── 오류 상태 ────────────────────────────────────────────── -->
    <div id="errorState" class="hidden flex flex-col items-center justify-center py-24 text-gray-400">
        <div class="w-24 h-24 bg-gray-100 rounded-[32px] flex items-center justify-center mb-5">
            <i class="fas fa-exclamation-triangle text-3xl text-gray-300"></i>
        </div>
        <p class="text-base font-bold text-gray-500">도서 정보를 불러올 수 없습니다</p>
        <p class="text-sm text-gray-400 mt-1">잠시 후 다시 시도해 주세요</p>
        <a href="/books" class="mt-6 px-6 py-2.5 bg-boogie-main text-white text-sm font-bold rounded-xl hover:bg-boogie-dark transition-colors">
            목록으로 돌아가기
        </a>
    </div>

    <input type="hidden" id="bookIdInput" th:value="${bookId}"/>

</th:block>

<th:block layout:fragment="script">
<script>
    /* ── bookId 추출 ─────────────────────────────────────────────── */
    const bookId = document.getElementById('bookIdInput').value;

    /* ── 모듈 상태 ───────────────────────────────────────────────── */
    let currentHolds  = [];
    let myBorrowId    = null;

    /* ── 진입점 ──────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
        loadDetail();
    });

    /* ── 데이터 로드 ─────────────────────────────────────────────── */
    async function loadDetail() {
        try {
            const [bookRes, holdsRes, reservationsRes, myBorrowRes] = await Promise.all([
                window.api.fetch(`/api/v1/books/${bookId}`),
                window.api.fetch(`/api/books/${bookId}/holds`),
                window.api.fetch(`/api/v1/reservations?bookId=${bookId}`),
                window.api.fetch(`/api/v1/borrows/me?bookId=${bookId}`)
            ]);

            if (!bookRes || !bookRes.ok) throw new Error(bookRes?.status);

            const book         = await bookRes.json();
            currentHolds       = holdsRes?.ok       ? await holdsRes.json()        : [];
            const reservations = reservationsRes?.ok ? await reservationsRes.json() : [];

            myBorrowId = null;
            if (myBorrowRes?.status === 200) {
                const myBorrow = await myBorrowRes.json();
                myBorrowId = myBorrow?.borrowId ?? null;
            }

            renderDetail(book, currentHolds, reservations);
        } catch (e) {
            console.error('도서 상세 조회 실패:', e);
            showError();
        }
    }

    /* ── 렌더링 ──────────────────────────────────────────────────── */
    function renderDetail(book, holds, reservations) {
        // 썸네일
        const thumbWrap = document.getElementById('thumbnailWrap');
        if (book.thumbnail && book.thumbnail.trim()) {
            thumbWrap.innerHTML = `<img src="${escapeHtml(book.thumbnail)}" alt="${escapeHtml(book.title)}"
                class="w-full h-full object-cover"
                onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-gray-200\\'><i class=\\'fas fa-book text-5xl\\'></i></div>'"
            >`;
        }

        // 기본 정보
        document.getElementById('bookTitle').textContent       = book.title       || '제목 없음';
        document.getElementById('bookAuthors').textContent     = Array.isArray(book.authors) ? book.authors.join(', ') : (book.authors || '저자 미상');
        document.getElementById('bookPublisher').textContent   = book.publisher   || '-';
        document.getElementById('bookPublishedAt').textContent = book.publishedAt ? book.publishedAt.substring(0, 10) : '-';
        document.getElementById('bookIsbn').textContent        = book.isbn        || '-';

        // 대출 가능 현황 배너
        const availableStock = book.availableStock ?? 0;
        const isAvailable    = availableStock > 0;
        const availBar  = document.getElementById('availabilityBar');
        const availIcon = document.getElementById('availabilityIcon');
        const availText = document.getElementById('availabilityText');

        if (isAvailable) {
            availBar.className  = 'avail-bar avail-bar-ok';
            availIcon.className = 'fas fa-circle-check text-xl flex-shrink-0';
            availText.innerHTML = `현재 대출 가능 <strong>${availableStock}</strong>권`;
        } else {
            availBar.className  = 'avail-bar avail-bar-none';
            availIcon.className = 'fas fa-circle-xmark text-xl flex-shrink-0';
            availText.innerHTML = '현재 대출 가능한 재고가 없습니다.';
        }

        // 도서 소개 카드
        const contents = book.contents || '';
        if (contents.trim()) {
            document.getElementById('bookContents').textContent = contents;
            document.getElementById('descriptionCard').classList.remove('hidden');
        }

        // 액션 버튼 (반납하기 > 대출하기 > 예약하기 우선순위)
        const btn = document.getElementById('mainActionBtn');
        btn.classList.remove('hidden');
        if (myBorrowId) {
            btn.innerHTML = '<i class="fas fa-rotate-left"></i> 반납하기';
            btn.className = 'action-btn action-btn-return';
            btn.onclick   = () => handleReturn(book);
        } else if (isAvailable) {
            btn.innerHTML = '<i class="fas fa-book-open"></i> 대출하기';
            btn.className = 'action-btn action-btn-primary';
            btn.onclick   = () => handleBorrow(book);
        } else {
            btn.innerHTML = '<i class="fas fa-clock"></i> 예약하기';
            btn.className = 'action-btn action-btn-reserve';
            btn.onclick   = () => handleReserve(book);
        }

        // 소장 정보 테이블
        renderHolds(holds);

        // 예약 대기 현황 테이블
        renderReservations(reservations);

        // 표시
        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('detailCard').classList.remove('hidden');

        // 도서 소개 더보기 처리 (렌더링 된 이후에 계산)
        if (contents.trim()) {
            setTimeout(() => {
                const contentsEl = document.getElementById('bookContents');
                if (contentsEl.scrollHeight > contentsEl.clientHeight) {
                    const expandBtn = document.getElementById('expandContentsBtn');
                    const overlay   = document.getElementById('contentOverlay');
                    expandBtn.classList.remove('hidden');
                    expandBtn.classList.add('flex');
                    expandBtn.onclick = () => {
                        contentsEl.classList.remove('line-clamp-3');
                        overlay.classList.add('hidden');
                        expandBtn.classList.add('hidden');
                    };
                } else {
                    document.getElementById('contentOverlay').classList.add('hidden');
                }
            }, 50);
        }
    }

    /* ── 소장 정보 테이블 ────────────────────────────────────────── */
    function renderHolds(holds) {
        const list = Array.isArray(holds) ? holds : (holds.content ?? []);
        document.getElementById('holdCountBadge').textContent = `총 ${list.length}건`;

        const tbody = document.getElementById('holdsTbody');
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-gray-400 text-sm">소장 정보가 없습니다.</td></tr>`;
            return;
        }
        tbody.innerHTML = list.map(h => `
            <tr class="hover:bg-gray-50 transition-colors">
                <td class="py-3 pr-4 font-mono text-xs text-gray-500">${escapeHtml(String(h.bookHoldId ?? '-'))}</td>
                <td class="py-3 pr-4">${holdStatusBadge(h.bookHoldStatus)}</td>
                <td class="py-3 pr-4 text-gray-500 text-xs">${h.location ? escapeHtml(h.location) : '<span class="text-gray-300">-</span>'}</td>
                <td class="py-3 text-gray-400 text-xs">${h.updatedAt ? escapeHtml(h.updatedAt.substring(0, 10)) : '<span class="text-gray-300">-</span>'}</td>
            </tr>
        `).join('');
    }

    function holdStatusBadge(status) {
        const map = {
            'AVAILABLE':    ['badge badge-green', '대출가능'],
            'BORROWED':     ['badge badge-amber', '대출중'],
            'RESERVE_HOLD': ['badge badge-blue',  '예약대기'],
            'LOST':         ['badge badge-gray',  '분실'],
            'DISCARDED':    ['badge badge-gray',  '폐기'],
        };
        const [cls, label] = map[status] || ['badge badge-gray', status || '-'];
        return `<span class="${cls}">${escapeHtml(label)}</span>`;
    }

    /* ── 예약 대기 현황 테이블 ───────────────────────────────────── */
    function renderReservations(reservations) {
        const list = Array.isArray(reservations) ? reservations : (reservations.content ?? []);
        if (!list.length) return;

        document.getElementById('reservationCard').classList.remove('hidden');
        document.getElementById('reservationCountBadge').textContent = `대기 ${list.length}명`;

        const tbody = document.getElementById('reservationTbody');
        tbody.innerHTML = list.map((r, i) => `
            <tr class="hover:bg-gray-50 transition-colors">
                <td class="py-3 pr-4">
                    <span class="w-6 h-6 inline-flex items-center justify-center rounded-full text-xs font-black
                        ${i === 0 ? 'bg-boogie-main text-white' : 'bg-gray-100 text-gray-500'}">
                        ${i + 1}
                    </span>
                </td>
                <td class="py-3 pr-4 text-gray-700 font-medium">${escapeHtml(r.userName || r.userId || '-')}</td>
                <td class="py-3 text-gray-400 text-xs">${r.reservedAt ? escapeHtml(r.reservedAt.substring(0, 16).replace('T', ' ')) : '-'}</td>
            </tr>
        `).join('');
    }

    /* ── 대출 처리 ───────────────────────────────────────────────── */
    async function handleBorrow(book) {
        const availableHold = currentHolds.find(h => h.bookHoldStatus === 'AVAILABLE');
        if (!availableHold) {
            Swal.fire({ title: '재고 없음', text: '현재 대출 가능한 재고가 없습니다.', icon: 'warning', confirmButtonColor: '#00A760' });
            return;
        }

        const title   = book.title || '이 도서';
        const confirm = await Swal.fire({
            title: '도서 대출',
            html: `<span class="font-bold text-boogie-dark">${escapeHtml(title)}</span><br>를 대출하시겠습니까?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#00A760',
            cancelButtonColor:  '#9CA3AF',
            confirmButtonText:  '대출하기',
            cancelButtonText:   '취소'
        });
        if (!confirm.isConfirmed) return;

        try {
            const res = await window.api.fetch('/api/v1/borrows', {
                method: 'POST',
                body: JSON.stringify({ bookHoldId: availableHold.bookHoldId, reason: '' })
            });
            if (res && (res.ok || res.status === 201)) {
                await Swal.fire({
                    title: '대출 완료!',
                    html: '도서 대출이 완료되었습니다.<br><small class="text-gray-400">마이페이지에서 대출 현황을 확인하세요.</small>',
                    icon: 'success', confirmButtonColor: '#00A760', confirmButtonText: '확인'
                });
                loadDetail();
            } else {
                const err = await res?.json().catch(() => ({}));
                Swal.fire({ title: '대출 실패', text: err.message || '대출 처리 중 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#00A760' });
            }
        } catch (e) {
            Swal.fire({ title: '오류', text: '네트워크 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#00A760' });
        }
    }

    /* ── 반납 처리 ───────────────────────────────────────────────── */
    async function handleReturn(book) {
        const title   = book.title || '이 도서';
        const confirm = await Swal.fire({
            title: '도서 반납',
            html: `<span class="font-bold text-gray-700">${escapeHtml(title)}</span><br>을 반납하시겠습니까?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#6b7280',
            cancelButtonColor:  '#9CA3AF',
            confirmButtonText:  '반납하기',
            cancelButtonText:   '취소'
        });
        if (!confirm.isConfirmed) return;

        try {
            const res = await window.api.fetch(`/api/v1/borrows/${myBorrowId}/return`, {
                method: 'POST'
            });
            if (res && res.ok) {
                await Swal.fire({
                    title: '반납 완료!',
                    html: '도서 반납이 완료되었습니다.',
                    icon: 'success', confirmButtonColor: '#00A760', confirmButtonText: '확인'
                });
                loadDetail();
            } else {
                const err = await res?.json().catch(() => ({}));
                Swal.fire({ title: '반납 실패', text: err.message || '반납 처리 중 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#00A760' });
            }
        } catch (e) {
            Swal.fire({ title: '오류', text: '네트워크 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#00A760' });
        }
    }

    /* ── 예약 처리 ───────────────────────────────────────────────── */
    async function handleReserve(book) {
        const title   = book.title || '이 도서';
        const confirm = await Swal.fire({
            title: '도서 예약',
            html: `<span class="font-bold text-amber-600">${escapeHtml(title)}</span><br>를 예약하시겠습니까?<br><small class="text-gray-400">반납 시 알림을 드립니다.</small>`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#F59E0B',
            cancelButtonColor:  '#9CA3AF',
            confirmButtonText:  '예약하기',
            cancelButtonText:   '취소'
        });
        if (!confirm.isConfirmed) return;

        try {
            const res = await window.api.fetch('/api/v1/reservations', {
                method: 'POST',
                body: JSON.stringify({ bookId: Number(bookId) })
            });
            if (res && (res.ok || res.status === 201)) {
                await Swal.fire({
                    title: '예약 완료!',
                    html: '예약이 완료되었습니다.<br><small class="text-gray-400">반납되면 알림을 보내드립니다.</small>',
                    icon: 'success', confirmButtonColor: '#00A760', confirmButtonText: '확인'
                });
                loadDetail();
            } else {
                const err = await res?.json().catch(() => ({}));
                Swal.fire({ title: '예약 실패', text: err.message || '예약 처리 중 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#00A760' });
            }
        } catch (e) {
            Swal.fire({ title: '오류', text: '네트워크 오류가 발생했습니다.', icon: 'error', confirmButtonColor: '#00A760' });
        }
    }

    /* ── 오류 상태 ───────────────────────────────────────────────── */
    function showError() {
        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
    }

    /* ── XSS 방어 ────────────────────────────────────────────────── */
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
</script>
