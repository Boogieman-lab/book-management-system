<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>대출/반납 관제</title>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 페이지 헤더 -->
    <div class="mb-8">
        <h1 class="text-2xl font-black text-gray-900">대출/반납 관제</h1>
        <p class="text-sm text-gray-500 mt-1">전체 대출 현황을 조회하고 연체자를 관리합니다.</p>
    </div>

    <!-- 상태 필터 탭 -->
    <div class="flex gap-2 mb-6 flex-wrap">
        <button class="tab-btn active-tab px-4 py-2 rounded-xl text-sm font-bold transition-colors" data-status="">전체</button>
        <button class="tab-btn px-4 py-2 rounded-xl text-sm font-bold transition-colors" data-status="BORROWED">대출중</button>
        <button class="tab-btn px-4 py-2 rounded-xl text-sm font-bold transition-colors" data-status="OVERDUE">연체</button>
        <button class="tab-btn px-4 py-2 rounded-xl text-sm font-bold transition-colors" data-status="RETURNED">반납</button>
    </div>

    <!-- 대출 목록 카드 -->
    <div class="bg-white rounded-[24px] border border-gray-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                <tr class="border-b border-gray-100 bg-gray-50">
                    <th class="text-left px-6 py-4 font-bold text-gray-600">도서명</th>
                    <th class="text-left px-6 py-4 font-bold text-gray-600">대출자</th>
                    <th class="text-left px-6 py-4 font-bold text-gray-600">대출일</th>
                    <th class="text-left px-6 py-4 font-bold text-gray-600">반납 예정일</th>
                    <th class="text-left px-6 py-4 font-bold text-gray-600">반납일</th>
                    <th class="text-left px-6 py-4 font-bold text-gray-600">상태</th>
                </tr>
                </thead>
                <tbody id="borrows-tbody">
                <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-gray-400 text-sm">데이터를 불러오는 중...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div id="pagination" class="flex items-center justify-between px-6 py-4 border-t border-gray-100"></div>
    </div>

</th:block>

<th:block layout:fragment="script">
<script>
    let currentPage = 1;
    let currentStatus = '';

    const statusLabel = { BORROWED: '대출중', RETURNED: '반납', OVERDUE: '연체' };
    const statusClass = {
        BORROWED: 'bg-blue-100 text-blue-700',
        RETURNED: 'bg-green-100 text-green-700',
        OVERDUE:  'bg-red-100 text-red-600'
    };

    async function loadBorrows(page = 1, status = '') {
        const params = new URLSearchParams({ page, size: 10 });
        if (status) params.set('status', status);

        const data = await fetch(`/api/v1/admin/borrows?${params}`, { credentials: 'include' })
            .then(r => r.ok ? r.json() : null);

        const tbody = document.getElementById('borrows-tbody');
        if (!data || !data.content?.length) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400 text-sm">대출 내역이 없습니다.</td></tr>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        tbody.innerHTML = data.content.map(b => {
            const isOverdue = b.status === 'OVERDUE';
            const rowClass = isOverdue ? 'bg-red-50' : '';
            return `
            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors ${rowClass}">
                <td class="px-6 py-4 font-medium text-gray-900 max-w-[180px] truncate">${b.bookTitle}</td>
                <td class="px-6 py-4 text-gray-700">${b.userName}</td>
                <td class="px-6 py-4 text-gray-500">${b.borrowDate?.substring(0, 10) ?? '-'}</td>
                <td class="px-6 py-4 ${isOverdue ? 'text-red-600 font-bold' : 'text-gray-500'}">${b.dueDate?.substring(0, 10) ?? '-'}</td>
                <td class="px-6 py-4 text-gray-500">${b.returnDate?.substring(0, 10) ?? '-'}</td>
                <td class="px-6 py-4">
                    <span class="px-2.5 py-1 rounded-full text-[11px] font-bold ${statusClass[b.status] ?? 'bg-gray-100 text-gray-600'}">
                        ${statusLabel[b.status] ?? b.status}
                    </span>
                </td>
            </tr>`;
        }).join('');

        renderPagination(page, data.totalPages);
    }

    function renderPagination(page, totalPages) {
        const el = document.getElementById('pagination');
        if (totalPages <= 1) { el.innerHTML = ''; return; }
        el.innerHTML = `
            <button onclick="loadBorrows(${page - 1}, '${currentStatus}')" ${page <= 1 ? 'disabled' : ''}
                    class="px-3 py-1.5 rounded-lg text-sm font-bold text-gray-500 hover:bg-gray-100 disabled:opacity-30 transition-colors">← 이전</button>
            <span class="text-sm text-gray-500">${page} / ${totalPages}</span>
            <button onclick="loadBorrows(${page + 1}, '${currentStatus}')" ${page >= totalPages ? 'disabled' : ''}
                    class="px-3 py-1.5 rounded-lg text-sm font-bold text-gray-500 hover:bg-gray-100 disabled:opacity-30 transition-colors">다음 →</button>`;
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');
            currentStatus = btn.dataset.status;
            currentPage = 1;
            loadBorrows(1, currentStatus);
        });
    });

    document.addEventListener('DOMContentLoaded', () => loadBorrows(1, ''));
</script>
<style>
    .tab-btn { background: #f3f4f6; color: #6b7280; }
    .tab-btn.active-tab { background: #00A760; color: #fff; }
</style>
</th:block>
</body>
</html>
