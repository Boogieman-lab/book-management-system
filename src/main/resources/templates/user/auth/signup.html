<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>회원가입</title>
</head>
<body>
    <th:block layout:fragment="content">
        <div class="flex items-center justify-center min-h-[75vh]">
            <div class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-8 md:p-12 w-full max-w-lg hover-lift transition-all">
                
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-pretendard font-black text-gray-900 mb-2 tracking-tight">회원가입</h1>
                    <p class="text-gray-500 text-sm">부기맨 시스템에 오신 것을 환영합니다.</p>
                </div>

                <form id="signup-form" class="space-y-6">
                    <div id="error-msg" class="hidden text-sm text-boogie-blush font-semibold bg-red-50 p-3 rounded-xl border border-red-100 text-center">
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">이름</label>
                            <input type="text" id="name" required
                                   class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-boogie-light focus:border-boogie-main transition-colors text-sm placeholder-gray-400" 
                                   placeholder="실명을 입력해주세요">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">이메일 주소</label>
                            <input type="email" id="email" required
                                   class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-boogie-light focus:border-boogie-main transition-colors text-sm placeholder-gray-400" 
                                   placeholder="company@domain.com">
                        </div>
                        <div>
                            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">비밀번호</label>
                            <input type="password" id="password" required
                                   class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-boogie-light focus:border-boogie-main transition-colors text-sm placeholder-gray-400" 
                                   placeholder="영문, 숫자 포함 8자리 이상">
                        </div>
                        <div>
                            <label for="department" class="block text-sm font-semibold text-gray-700 mb-1">소속 부서 (선택)</label>
                            <input type="text" id="department"
                                   class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-boogie-light focus:border-boogie-main transition-colors text-sm placeholder-gray-400" 
                                   placeholder="소속 팀/부서명">
                        </div>
                    </div>

                    <div class="mt-8 border-t border-gray-100 pt-6">
                        <button type="submit" class="w-full bg-boogie-main text-white font-bold py-3.5 px-4 rounded-xl hover:bg-boogie-dark transition-colors shadow-sm text-lg tracking-wide hover-lift">
                            가입하기
                        </button>
                    </div>
                </form>

                <p class="mt-8 text-center text-sm text-gray-500">
                    이미 계정이 있으신가요? 
                    <a href="/user/auth/login" class="text-boogie-main font-bold hover:underline ml-1">로그인 하러가기</a>
                </p>
                
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="script">
        <script>
            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const department = document.getElementById('department').value;
                const errorDiv = document.getElementById('error-msg');

                try {
                    const response = await fetch('/api/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: name, email, password })
                    });

                    if (response.status === 201 || response.ok) {
                        alert("부기맨의 회원이 되신 것을 환영합니다!\n로그인 페이지로 이동합니다.");
                        window.location.href = '/user/auth/login';
                    } else if (response.status === 400) {
                        const errorData = await response.json().catch(() => null);
                        errorDiv.textContent = errorData?.message || "입력 양식을 다시 확인해주세요.";
                        errorDiv.classList.remove('hidden');
                    } else {
                        errorDiv.textContent = "서버 통신 중 오류가 발생했습니다. 잠시 후 시도해주세요.";
                        errorDiv.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error("Signup failed:", error);
                    errorDiv.textContent = "네트워크 에러가 발생했습니다.";
                    errorDiv.classList.remove('hidden');
                }
            });
        </script>
    </th:block>
</body>
</html>
