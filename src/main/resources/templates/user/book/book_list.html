<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>도서 목록</title>
</head>
<body>

<th:block layout:fragment="head">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        /* 검색바 sticky 위치를 GNB(h-20=80px) 바로 아래로 고정 */
        .sticky-search { position: sticky; top: 80px; z-index: 40; background: #f4f7f5; padding: 12px 0 8px; }
    </style>
</th:block>

<th:block layout:fragment="content">

    <!-- ── 검색 바 (GNB 바로 아래 고정) ─────────────────────────────── -->
    <div class="sticky-search">
        <div class="flex gap-3">
            <div class="flex flex-1 bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm focus-within:ring-2 focus-within:ring-boogie-light focus-within:border-boogie-main transition-all">
                <select id="searchField"
                        class="px-4 py-3 text-sm text-gray-600 border-r border-gray-100 bg-transparent focus:outline-none cursor-pointer min-w-[80px]">
                    <option value="TITLE">제목</option>
                    <option value="AUTHOR">저자</option>
                    <option value="PUBLISHER">출판사</option>
                    <option value="ISBN">ISBN</option>
                </select>
                <input id="searchInput" type="text" placeholder="도서명, 저자, 출판사, ISBN 검색..."
                       class="flex-1 px-4 py-3 text-sm focus:outline-none bg-transparent placeholder-gray-400">
                <button id="searchBtn"
                        class="px-5 py-3 bg-boogie-main text-white text-sm font-bold hover:bg-boogie-dark transition-colors flex items-center gap-2">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <!-- 필터 칩 -->
        <div class="flex gap-2 mt-3 overflow-x-auto pb-1 scrollbar-none">
            <button class="filter-chip flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-bold border border-boogie-main bg-boogie-main text-white transition-all" data-sort="">전체</button>
            <button class="filter-chip flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-bold border border-gray-200 bg-white text-gray-600 hover:border-boogie-main hover:text-boogie-main transition-all" data-filter="available">대출 가능</button>
            <button class="filter-chip flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-bold border border-gray-200 bg-white text-gray-600 hover:border-boogie-main hover:text-boogie-main transition-all" data-sort="createdAt,desc">최신순</button>
            <button class="filter-chip flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-bold border border-gray-200 bg-white text-gray-600 hover:border-boogie-main hover:text-boogie-main transition-all" data-sort="borrowCount,desc">인기순</button>
            <button class="filter-chip flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-bold border border-gray-200 bg-white text-gray-600 hover:border-boogie-main hover:text-boogie-main transition-all" data-sort="title,asc">가나다순</button>
        </div>
    </div>

    <!-- ── 결과 카운트 ────────────────────────────────────────────────── -->
    <div id="resultInfo" class="hidden flex items-center justify-between mt-4 mb-2">
        <p class="text-sm text-gray-500">
            총 <span id="totalCount" class="font-black text-boogie-main">0</span>권
        </p>
    </div>

    <!-- ── 스켈레톤 로딩 ──────────────────────────────────────────────── -->
    <div id="skeletonGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mt-4">
    </div>

    <!-- ── 도서 카드 그리드 ───────────────────────────────────────────── -->
    <div id="bookGrid" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mt-4">
    </div>

    <!-- ── 빈 상태 ────────────────────────────────────────────────────── -->
    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-24 text-gray-400">
        <div class="w-24 h-24 bg-gray-100 rounded-[32px] flex items-center justify-center mb-5 shadow-sm">
            <i class="fas fa-book-open text-3xl text-gray-300"></i>
        </div>
        <p class="text-base font-bold text-gray-500">검색 결과가 없습니다</p>
        <p class="text-sm text-gray-400 mt-1">다른 검색어로 다시 시도해보세요</p>
    </div>

    <!-- ── 페이지네이션 ───────────────────────────────────────────────── -->
    <div id="pagination" class="hidden flex justify-center gap-2 mt-10 mb-4">
    </div>

</th:block>

<th:block layout:fragment="script">
<script>
    /* ── 상태 ─────────────────────────────────────────────────────────── */
    let currentPage  = 0;
    let currentQuery = '';
    let currentField = 'TITLE';
    let currentSort  = '';
    let availableOnly = false;

    /* ── 진입점 ───────────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
        showSkeleton();
        fetchBooks(0);
        initSearch();
        initFilterChips();
        initBookGrid();
    });

    /* ── 카드 클릭 위임 + 이미지 폴백 (이벤트 위임 방식) ──────────────── */
    function initBookGrid() {
        const grid = document.getElementById('bookGrid');

        // 카드 클릭: data-book-id 속성을 읽어 페이지 이동 (onclick 인라인 제거)
        grid.addEventListener('click', function (e) {
            const card = e.target.closest('[data-book-id]');
            if (!card) return;
            const id = Number(card.dataset.bookId);
            if (Number.isFinite(id) && id > 0) {
                location.href = '/books/' + id;
            }
        });

        // 이미지 로드 실패: onerror 인라인 핸들러 대신 캡처 단계 이벤트 위임
        grid.addEventListener('error', function (e) {
            if (e.target.tagName !== 'IMG' || !e.target.classList.contains('book-cover-img')) return;
            const wrapper = e.target.parentElement;
            const fallback = document.createElement('div');
            fallback.className = 'book-cover-fallback w-full h-full flex items-center justify-center text-gray-300';
            fallback.innerHTML = '<i class="fas fa-book text-4xl"></i>';
            wrapper.replaceChild(fallback, e.target);
        }, true);
    }

    /* ── API 호출 ─────────────────────────────────────────────────────── */
    async function fetchBooks(page) {
        showSkeleton();

        const params = new URLSearchParams({ page, size: 20 });
        if (currentQuery) { params.set('keyword', currentQuery); params.set('field', currentField); }
        if (availableOnly) params.set('available', 'true');
        if (currentSort)   params.set('sort', currentSort);

        try {
            const res = await window.api.fetch(`/api/v1/books?${params}`);
            if (!res || !res.ok) throw new Error(res?.status);
            const data = await res.json();
            renderBooks(data);
        } catch (e) {
            console.error('도서 목록 조회 실패:', e);
            showEmpty();
        }
    }

    /* ── 렌더링 ───────────────────────────────────────────────────────── */
    function renderBooks(data) {
        // 배열 또는 페이지 응답 모두 처리
        const books      = Array.isArray(data) ? data : (data.content ?? []);
        const total      = data.totalElements  ?? books.length;
        const totalPages = data.totalPages      ?? Math.ceil(total / (data.size ?? 20));
        const page       = data.number          ?? currentPage;

        hideSkeleton();

        if (books.length === 0) { showEmpty(); return; }

        document.getElementById('totalCount').textContent = total.toLocaleString();
        document.getElementById('resultInfo').classList.remove('hidden');
        document.getElementById('emptyState').classList.add('hidden');

        const grid = document.getElementById('bookGrid');
        grid.innerHTML = books.map(createBookCard).join('');
        grid.classList.remove('hidden');

        renderPagination(page, totalPages);
    }

    /* ── 카드 HTML 생성 ───────────────────────────────────────────────── */
    function createBookCard(book) {
        // const authors     = Array.isArray(book.authors) ? book.authors.join(', ') : (book.authors || '저자 미상');
        const isAvailable = (book.availableStock ?? 0) > 0;
        const stock       = book.availableStock ?? 0;

        // [SECURITY] bookId는 반드시 정수여야 함 — 비정수 값은 카드 렌더링 스킵
        const safeId = Number(book.bookId);
        if (!Number.isFinite(safeId) || safeId <= 0) return '';

        const badge = isAvailable
            ? `<span class="absolute top-3 right-3 px-2.5 py-1 bg-boogie-light text-boogie-dark text-[10px] font-black rounded-full border border-boogie-main border-opacity-20 shadow-sm whitespace-nowrap">
                   대출가능 <span class="opacity-70">(${stock})</span>
               </span>`
            : `<span class="absolute top-3 right-3 px-2.5 py-1 bg-amber-50 text-amber-600 text-[10px] font-black rounded-full border border-amber-200 shadow-sm">
                   예약가능
               </span>`;

        // [SECURITY] coverUrl을 escapeHtml로 처리해 속성 탈출(XSS) 방지
        // [SECURITY] onerror 인라인 핸들러 제거 — 이미지 에러는 이벤트 위임(initImageFallback)으로 처리
        const thumb = (book.coverUrl && book.coverUrl.trim())
            ? `<img src="${escapeHtml(book.coverUrl)}" alt="${escapeHtml(book.title)}"
                    class="w-full h-full object-cover book-cover-img">`
            : `<div class="book-cover-fallback w-full h-full flex items-center justify-center text-gray-300"><i class="fas fa-book text-4xl"></i></div>`;

        return `
            <div class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-4 hover-lift cursor-pointer relative group"
                 data-book-id="${safeId}">
                ${badge}
                <!-- 표지 -->
                <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden bg-gray-50 mb-3">
                    ${thumb}
                </div>
                <!-- 정보 -->
                <div class="px-1">
                    <h3 class="text-sm font-bold text-gray-900 line-clamp-2 leading-tight mb-1 group-hover:text-boogie-main transition-colors">
                        ${escapeHtml(book.title || '제목 없음')}
                    </h3>
                    <p class="text-xs text-gray-500 line-clamp-1">${escapeHtml(book.author)}</p>
                    <p class="text-xs text-gray-400 mt-0.5 line-clamp-1">${escapeHtml(book.publisher || '')}</p>
                    ${book.categoryName ? `<p class="text-[10px] text-boogie-dark bg-boogie-light px-2 py-0.5 rounded-full mt-1.5 line-clamp-1 inline-block max-w-full">${escapeHtml(book.categoryName.split('>').pop().trim())}</p>` : ''}
                </div>
            </div>`;
    }

    /* ── 스켈레톤 ─────────────────────────────────────────────────────── */
    function showSkeleton() {
        document.getElementById('bookGrid').classList.add('hidden');
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('resultInfo').classList.add('hidden');
        document.getElementById('pagination').classList.add('hidden');
        const sk = document.getElementById('skeletonGrid');
        sk.innerHTML = Array(10).fill(0).map(() => `
            <div class="bg-white rounded-[32px] p-4 animate-pulse border border-gray-100">
                <div class="w-full aspect-[3/4] bg-gray-100 rounded-2xl mb-3"></div>
                <div class="h-3 bg-gray-100 rounded-full mb-2 w-full"></div>
                <div class="h-2 bg-gray-100 rounded-full w-2/3"></div>
            </div>`).join('');
        sk.classList.remove('hidden');
    }

    function hideSkeleton() {
        document.getElementById('skeletonGrid').classList.add('hidden');
    }

    function showEmpty() {
        hideSkeleton();
        document.getElementById('bookGrid').classList.add('hidden');
        document.getElementById('resultInfo').classList.add('hidden');
        document.getElementById('pagination').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
    }

    /* ── 페이지네이션 ─────────────────────────────────────────────────── */
    function renderPagination(page, totalPages) {
        const el = document.getElementById('pagination');
        if (totalPages <= 1) { el.classList.add('hidden'); return; }

        el.classList.remove('hidden');
        const start = Math.max(0, page - 2);
        const end   = Math.min(totalPages - 1, page + 2);
        const pages = [];

        if (start > 0) { pages.push({ l: '1', p: 0 }); if (start > 1) pages.push({ l: '…', p: -1 }); }
        for (let i = start; i <= end; i++) pages.push({ l: String(i + 1), p: i });
        if (end < totalPages - 1) { if (end < totalPages - 2) pages.push({ l: '…', p: -1 }); pages.push({ l: String(totalPages), p: totalPages - 1 }); }

        const btnBase = 'px-3.5 py-2 rounded-xl text-sm font-medium transition-all';
        el.innerHTML = `
            <button onclick="goPage(${page - 1})" ${page === 0 ? 'disabled' : ''}
                    class="${btnBase} bg-white border border-gray-200 text-gray-500 hover:border-boogie-main hover:text-boogie-main disabled:opacity-40 disabled:cursor-not-allowed">
                <i class="fas fa-chevron-left text-xs"></i>
            </button>
            ${pages.map(({ l, p }) => p === -1
                ? `<span class="px-2 text-gray-400 text-sm self-center">…</span>`
                : `<button onclick="goPage(${p})" class="${btnBase} ${p === page
                    ? 'bg-boogie-main text-white shadow-sm'
                    : 'bg-white border border-gray-200 text-gray-600 hover:border-boogie-main hover:text-boogie-main'}">${l}</button>`
            ).join('')}
            <button onclick="goPage(${page + 1})" ${page >= totalPages - 1 ? 'disabled' : ''}
                    class="${btnBase} bg-white border border-gray-200 text-gray-500 hover:border-boogie-main hover:text-boogie-main disabled:opacity-40 disabled:cursor-not-allowed">
                <i class="fas fa-chevron-right text-xs"></i>
            </button>`;
    }

    function goPage(page) {
        if (page < 0) return;
        currentPage = page;
        fetchBooks(page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── 검색 ─────────────────────────────────────────────────────────── */
    function initSearch() {
        const input = document.getElementById('searchInput');
        const btn   = document.getElementById('searchBtn');
        const field = document.getElementById('searchField');
        const doSearch = () => {
            currentQuery = input.value.trim();
            currentField = field.value;
            currentPage  = 0;
            fetchBooks(0);
        };
        btn.addEventListener('click', doSearch);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    }

    /* ── 필터 칩 ──────────────────────────────────────────────────────── */
    function initFilterChips() {
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function () {
                document.querySelectorAll('.filter-chip').forEach(c => {
                    c.classList.remove('bg-boogie-main', 'text-white', 'border-boogie-main');
                    c.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
                });
                this.classList.add('bg-boogie-main', 'text-white', 'border-boogie-main');
                this.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');

                currentSort   = this.dataset.sort  || '';
                availableOnly = this.dataset.filter === 'available';
                currentPage   = 0;
                fetchBooks(0);
            });
        });
    }

    /* ── XSS 방어 ─────────────────────────────────────────────────────── */
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
</script>
</th:block>

</body>
</html>
