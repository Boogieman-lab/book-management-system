<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>통계 대시보드</title>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 페이지 헤더 -->
    <div class="mb-8">
        <h1 class="text-2xl font-black text-gray-900">통계 대시보드</h1>
        <p class="text-sm text-gray-500 mt-1">시스템 현황과 주요 지표를 한눈에 확인하세요.</p>
    </div>

    <!-- 요약 카드 4종 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">

        <!-- 전체 대출 -->
        <div class="bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift">
            <div class="flex items-center justify-between mb-4">
                <span class="text-2xl">📖</span>
                <span id="badge-borrows"
                      class="px-2.5 py-1 text-[10px] font-bold text-white rounded-full"
                      style="background: linear-gradient(135deg,#00A760 0%,#10B981 100%);">대출</span>
            </div>
            <p class="text-3xl font-black text-gray-900" id="stat-total-borrows">-</p>
            <p class="text-sm text-gray-500 mt-1">전체 대출 건수</p>
        </div>

        <!-- 연체 -->
        <div class="bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift">
            <div class="flex items-center justify-between mb-4">
                <span class="text-2xl">⚠️</span>
                <span class="px-2.5 py-1 text-[10px] font-bold text-white bg-red-500 rounded-full">연체</span>
            </div>
            <p class="text-3xl font-black text-gray-900" id="stat-overdue">-</p>
            <p class="text-sm text-gray-500 mt-1">현재 연체 건수</p>
        </div>

        <!-- 예약 대기 -->
        <div class="bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift">
            <div class="flex items-center justify-between mb-4">
                <span class="text-2xl">🔖</span>
                <span class="px-2.5 py-1 text-[10px] font-bold text-yellow-700 bg-yellow-100 rounded-full">예약</span>
            </div>
            <p class="text-3xl font-black text-gray-900" id="stat-reservations">-</p>
            <p class="text-sm text-gray-500 mt-1">예약 대기 건수</p>
        </div>

        <!-- 희망도서 대기 -->
        <div class="bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift">
            <div class="flex items-center justify-between mb-4">
                <span class="text-2xl">📥</span>
                <span class="px-2.5 py-1 text-[10px] font-bold text-blue-700 bg-blue-100 rounded-full">신청</span>
            </div>
            <p class="text-3xl font-black text-gray-900" id="stat-requests">-</p>
            <p class="text-sm text-gray-500 mt-1">승인 대기 신청</p>
        </div>
    </div>

    <!-- 바로가기 카드 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

        <a href="/admin/books"
           class="group bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift flex flex-col gap-3">
            <span class="text-3xl">📚</span>
            <div>
                <p class="font-black text-gray-900 group-hover:text-boogie-main transition-colors">도서 센터</p>
                <p class="text-xs text-gray-400 mt-0.5">신규 등록 및 실물 추가</p>
            </div>
        </a>

        <a href="/admin/borrows"
           class="group bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift flex flex-col gap-3">
            <span class="text-3xl">🔄</span>
            <div>
                <p class="font-black text-gray-900 group-hover:text-boogie-main transition-colors">대출/반납 관제</p>
                <p class="text-xs text-gray-400 mt-0.5">연체자 현황 및 처리</p>
            </div>
        </a>

        <a href="/admin/requests"
           class="group bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift flex flex-col gap-3">
            <span class="text-3xl">📥</span>
            <div>
                <p class="font-black text-gray-900 group-hover:text-boogie-main transition-colors">희망도서 결재함</p>
                <p class="text-xs text-gray-400 mt-0.5">신청 승인 및 거절</p>
            </div>
        </a>

        <a href="/admin/users"
           class="group bg-white rounded-[24px] p-6 border border-gray-50 shadow-sm hover-lift flex flex-col gap-3">
            <span class="text-3xl">👥</span>
            <div>
                <p class="font-black text-gray-900 group-hover:text-boogie-main transition-colors">임직원 목록</p>
                <p class="text-xs text-gray-400 mt-0.5">권한 및 상태 관리</p>
            </div>
        </a>
    </div>

</th:block>

<th:block layout:fragment="script">
<script>
/* 통계 API 호출 (구현 시 /api/v1/admin/stats/overview 연동) */
const loadStats = async () => {
    try {
        const data = await fetch('/api/v1/admin/stats/overview', { credentials: 'include' })
            .then(r => r.ok ? r.json() : null);
        if (!data) return;
        document.getElementById('stat-total-borrows').textContent = data.totalBorrows  ?? '-';
        document.getElementById('stat-overdue').textContent       = data.overdueCount  ?? '-';
        document.getElementById('stat-reservations').textContent  = data.reservations  ?? '-';
        document.getElementById('stat-requests').textContent      = data.pendingRequests ?? '-';
    } catch (_) { /* 미구현 API — 수치 표시 생략 */ }
};
loadStats();
</script>
</th:block>
</body>
</html>
